<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockMate | Pro Video Interview</title>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 1000px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: var(--primary); font-size: 28px; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        
        .setup-panel { background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #475569; }
        input[type="text"], input[type="file"], textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 80px; }
        
        button { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-mic { background-color: #10b981; color: white; }
        .btn-mic:hover { background-color: #059669; }
        .btn-danger { background-color: #ef4444; color: white; margin-top: 10px;}
        .btn-danger:hover { background-color: #dc2626; }

        .interview-area { display: none; display: flex; gap: 20px; margin-top: 20px; }
        .video-section { flex: 1; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 400px; border-radius: 12px; border: 4px solid var(--primary); background: #000; transform: scaleX(-1); }
        .video-label { margin-top: 10px; font-weight: bold; color: #ef4444; display: flex; align-items: center; gap: 5px; }
        .dot { height: 10px; width: 10px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .chat-section { flex: 1.5; display: flex; flex-direction: column; }
        #chat-box { height: 350px; overflow-y: auto; padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;}
        .msg { padding: 12px 18px; border-radius: 16px; max-width: 85%; line-height: 1.5; font-size: 14px; }
        .ai-msg { background: #e0f2fe; align-self: flex-start; border-bottom-left-radius: 4px; color: #0369a1; }
        .user-msg { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        #scorecard-panel { display: none; margin-top: 20px; padding: 25px; background: #fffbeb; border: 2px solid #fcd34d; border-radius: 12px; }
        #scorecard-content h3 { color: #b45309; margin-top: 15px; border-bottom: 1px solid #fcd34d; padding-bottom: 5px;}
        #loading { display: none; text-align: center; color: var(--accent); font-weight: bold; margin-top: 10px; font-size: 18px;}
    </style>
</head>
<body>

<div class="app-container">
    <h1>🚀 MockMate Pro</h1>
    <p class="subtitle">AI Interview Coach with Live Camera & JD Analysis</p>
    
    <div class="setup-panel" id="setup-panel">
        <label>Target Job Title</label>
        <input type="text" id="role" placeholder="e.g., Senior Python Developer">
        
        <label>Job Description (Paste requirements here)</label>
        <textarea id="jd" placeholder="e.g., Must have 3 years experience in FastAPI, REST APIs, and Docker..."></textarea>
        
        <label>Interview Duration</label>
        <select id="duration">
            <option value="3">Short (3 Questions)</option>
            <option value="5" selected>Standard (5 Questions - Default)</option>
            <option value="10">Detailed (10 Questions)</option>
        </select>

        <label>Upload Your Resume (PDF)</label>
        <input type="file" id="resume" accept="application/pdf">
        
        <button class="btn-primary" id="setup-btn" onclick="startSetup()">Start Live Interview</button>
        <div id="loading">Analyzing JD and Resume... Please wait ⏳</div>
    </div>

    <div id="interview-container" style="display: none;">
        <div class="interview-area">
            <div class="video-section">
                <video id="user-video" autoplay playsinline muted></video>
                <div class="video-label"><span class="dot"></span> Live Camera Active</div>
            </div>
            <div class="chat-section">
                <div id="chat-box"></div>
                <div id="controls">
                    <button id="mic-btn" class="btn-mic" onclick="startListening()">🎙️ Click to Speak Answer</button>
                    <button id="end-btn" class="btn-danger" onclick="endInterview()">🛑 Finish & Get Scorecard</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scorecard-panel">
        <h2>📊 Comprehensive Interview Analysis</h2>
        <div id="scorecard-content"></div>
    </div>
</div>

<script>
    let resumeText = "";
    let chatHistory = ""; 
    let recognition;
    let questionCount = 0;
    let maxQuestions = 5;

    async function startSetup() {
        const fileInput = document.getElementById('resume');
        const role = document.getElementById('role').value;
        const jd = document.getElementById('jd').value;
        maxQuestions = parseInt(document.getElementById('duration').value);

        if (!fileInput.files[0] || !role || !jd) { 
            alert("Please provide Role, Job Description, and Resume!"); 
            return; 
        }

        document.getElementById('setup-btn').style.display = "none";
        document.getElementById('loading').style.display = "block";

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const response = await fetch("http://127.0.0.1:8000/extract-resume", { method: "POST", body: formData });
        const data = await response.json();
        resumeText = data.resume_text;

        document.getElementById('setup-panel').style.display = "none";
        document.getElementById('interview-container').style.display = "block";
        
        startCamera();

        const greeting = `Hello! I have analyzed your resume against the ${role} job description. We will have a ${maxQuestions}-question interview today. Let's start. Tell me a bit about yourself.`;
        addMessage("AI", greeting);
        chatHistory += `AI: ${greeting}\n`;
        speakText(greeting);
    }

    function startCamera() {
        const videoElement = document.getElementById('user-video');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) { videoElement.srcObject = stream; })
            .catch(function(error) { console.log("Camera error:", error); });
        }
    }

    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        document.getElementById('mic-btn').innerText = "🔴 Listening... Speak now";
        document.getElementById('mic-btn').style.backgroundColor = "#ef4444";

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            document.getElementById('mic-btn').innerText = "🎙️ Click to Speak Answer";
            document.getElementById('mic-btn').style.backgroundColor = "#10b981";
            addMessage("You", transcript);
            chatHistory += `Candidate: ${transcript}\n`; 
            sendToAI(transcript);
        };
        recognition.start();
    }

    async function sendToAI(userMessage) {
        document.getElementById('mic-btn').disabled = true;
        document.getElementById('mic-btn').innerText = "⏳ AI is thinking...";

        const role = document.getElementById('role').value;
        const jd = document.getElementById('jd').value;
        
        const formData = new FormData();
        formData.append("user_message", userMessage);
        formData.append("resume_text", resumeText);
        formData.append("role", role);
        formData.append("job_description", jd);
        formData.append("chat_history", chatHistory);
        formData.append("question_count", questionCount);
        formData.append("max_questions", maxQuestions);

        const response = await fetch("http://127.0.0.1:8000/chat", { method: "POST", body: formData });
        const data = await response.json();
        
        addMessage("AI", data.ai_response);
        chatHistory += `AI: ${data.ai_response}\n`; 
        speakText(data.ai_response); 

        questionCount++; 

        document.getElementById('mic-btn').disabled = false;
        document.getElementById('mic-btn').innerText = "🎙️ Click to Speak Answer";
    }

    function speakText(text) {
        const speech = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(speech);
    }

    // THE FIX: Updated endInterview function
    async function endInterview() {
        if (recognition) recognition.stop();
        
        // 1. Read values FIRST before changing the UI
        const role = document.getElementById('role').value;
        const jd = document.getElementById('jd').value;

        // 2. Stop Camera
        const videoElement = document.getElementById('user-video');
        if (videoElement.srcObject) {
            videoElement.srcObject.getTracks().forEach(track => track.stop());
        }

        // 3. Update UI to show loading text safely
        document.getElementById('interview-container').style.display = "none";
        document.getElementById('scorecard-panel').style.display = "block";
        document.getElementById('scorecard-content').innerHTML = "<h3 style='text-align:center; color:#3b82f6;'>⏳ Analyzing Interview Data & Generating Scorecard... Please wait!</h3>";

        // 4. Send Data to Backend
        const formData = new FormData();
        formData.append("chat_history", chatHistory);
        formData.append("role", role);
        formData.append("job_description", jd);

        try {
            const response = await fetch("http://127.0.0.1:8000/scorecard", { method: "POST", body: formData });
            const data = await response.json();
            
            // Format the text perfectly
            let formattedScore = data.scorecard
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*)/g, '<li>$1</li>')
                .replace(/\n/g, '<br>');

            document.getElementById('scorecard-content').innerHTML = formattedScore;
        } catch (error) {
            document.getElementById('scorecard-content').innerHTML = "<p style='color:red;'>Error generating scorecard. Please check backend terminal.</p>";
        }
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender === 'You' ? 'user-msg' : 'ai-msg'}`;
        msgDiv.innerHTML = `<strong>${sender === 'You' ? 'You' : 'AI Interviewer'}:</strong><br>${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
